# Railway 部署配置 — Vite 静态站点
# 使用 Nixpacks 构建，nginx 服务静态文件

[phases.build]
cmds = [
  "corepack enable",
  "pnpm install --frozen-lockfile",
  "pnpm run build",
]

[phases.setup]
nixPkgs = ["nodejs_20", "nginx"]

[start]
cmd = "nginx -c /etc/nginx/nginx.conf -g 'daemon off;'"

# 静态站点无需端口，但 Railway 需要一个监听端口
[variables]
PORT = "8080"
